name: gitleaks
# Runs on:
#   - PRs targeting `release` or `develop` (opened/synchronize/reopened)
#   - direct pushes to `release` or `develop`
# gitleaks-action@v2 auto-scopes PR scans to the PR's commit range, so
# legacy secrets already on the base branch do not re-fail every new PR.
# On push events the action scans the pushed commit range.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  # contents: read         → actions/checkout
  # pull-requests: write   → gitleaks-action reads the PR's commit list and
  #                          posts its summary comment
  # issues: write          → actions/github-script createComment (PR comments
  #                          go through the issues API)
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # Cancel in-flight runs when a new commit is pushed to the same PR/branch.
  # Avoids stacked duplicate "secret found" comments during rapid iteration.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scanning
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # gitleaks-action reads the GITHUB_TOKEN env var to authenticate
          # when reading the PR's commit list and posting its summary comment.
          # The auto-provisioned GITHUB_TOKEN is sufficient as long as the
          # workflow's `permissions:` block grants pull-requests: write.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is a free key from gitleaks.io, required only
          # when this repo is owned by a GitHub Organization. Personal
          # accounts do not need it. Request one at
          # https://gitleaks.io/products.html and add it to repo secrets
          # as GITLEAKS_LICENSE.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Comment on PR if secrets found
        # Runs only when the scan step failed AND this is a pull_request event.
        # gitleaks-action posts its own summary table; this step adds an
        # actionable link to the remediation runbook. The comment intentionally
        # does NOT include secret values — it just points to the run log and
        # the runbook. Never paste raw findings into PR threads.
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const runUrl = `${repoUrl}/actions/runs/${context.runId}`;
            const docUrl = `${repoUrl}/blob/${context.payload.repository.default_branch}/.github/SECRET_FOUND.md`;
            const body = [
              '### :lock: gitleaks detected potential secrets in this PR',
              '',
              `See the [workflow run logs](${runUrl}) for detector names and file locations.`,
              '',
              `**Follow the remediation runbook → [SECRET_FOUND.md](${docUrl}).** Rotate the credential first, then scrub history.`,
              '',
              '**Do not paste secret values into this PR thread, issues, or chat** — those surfaces are visible to anyone with read access and are hard to scrub later.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
